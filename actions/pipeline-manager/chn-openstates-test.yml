# yaml-language-server: $schema=./config.schema.json
#
# TEST config — mirrors chn-openstates-files.yml but targets the govbot-test
# org instead of govbot-data. Used to re-run the formatter (with its log
# format fix) and the extract-text pipeline against real scraper data before
# cutting the real govbot-data repos over. See close_session.py's docstring
# and project notes for the retirement plan once this is validated.
#
# `session` (optional, per-locale): identifier for the legislative session this
# locale's repo currently holds, e.g. `session: "2025-2026"` or `session: "2026-ss1"`
# for a special session. Set/updated by close_session.py when rotating a repo to
# the archive org — see actions/pipeline-manager/close_session.py. Not backfilled
# for existing locales; filled in per-locale as the pilot progresses.
#
# extract-text is disabled for every locale below, matching the real
# chn-openstates-files.yml default. Enable it only for pilot states first
# (remove the `disabled_jobs: [extract-text]` entry) — see project notes on
# staggering the extraction rollout rather than flipping it on for all 57 at
# once.
template_markers:
  open: "✏️{"
  close: "}✏️"
org:
  username: govbot-test
templates:
  openstates-to-ocd-files:
    folder-name: ✏️{ locale.key }✏️-legislation
    fully_override_dirs:
      - .github
locales:
  al:
    template: openstates-to-ocd-files
    toolkit_branch: main
    name: Alabama
    disabled_jobs:
      - extract-text
