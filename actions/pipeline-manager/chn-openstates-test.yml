# yaml-language-server: $schema=./config.schema.json
#
# TEST config -- mirrors chn-openstates-files.yml but targets the govbot-test
# org instead of govbot-data. Used to re-run the formatter (with its log
# format fix) and the extract-text pipeline against real scraper data before
# cutting the real govbot-data repos over. See close_session.py docstring
# and project notes for the retirement plan once this is validated.
#
# extract-text is enabled for ALL locales here (full pilot rollout). Some
# will fail fast (no country:us data, e.g. paused/broken scrapers like il) --
# expected, not alarming, tracked separately.
#
# toolkit_branch pinned to feat/session-scoped-repo-lifecycle for every
# locale -- TEMP until fixes merge to main.
template_markers:
  open: ✏️{
  close: '}✏️'
org:
  username: govbot-test
templates:
  openstates-to-ocd-files:
    folder-name: ✏️{ locale.key }✏️-legislation
    fully_override_dirs:
    - .github
locales:
  al:
    template: openstates-to-ocd-files
    toolkit_branch: feat/session-scoped-repo-lifecycle
    name: Alabama
