name: OpenStates Scrape for ✏️{ locale.key }✏️

on:
  workflow_dispatch:
    inputs:
      force-update:
        type: boolean
        description: "Force push even if upstream changed (use with caution)"
        default: false
      use-self-hosted:
        type: boolean
        description: "Force self-hosted for this manual run instead of the default tinyproxy + GitHub-hosted path (only meaningful for locales configured runner: self-hosted; e.g. to test without the proxy)"
        default: false

# See the active (non-paused) template for the full explanation.
concurrency:
  group: scrape
  cancel-in-progress: false

env:
  STATE_CODE: ✏️{ locale.key }✏️
  # See the active (non-paused) template for the full explanation -- same
  # logic here, just no schedule trigger, since "paused" means dispatch-only
  # by design.
  USE_PROXY: ${{ '✏️{ locale.runner }✏️' == 'self-hosted' && !(github.event_name == 'workflow_dispatch' && inputs.use-self-hosted) }}

jobs:
  scrape:
    name: "🕷️ Scrape Data"
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.use-self-hosted) && 'self-hosted' || ('✏️{ locale.runner }✏️' == 'self-hosted' && 'ubuntu-latest' || '✏️{ locale.runner }✏️') }}
    timeout-minutes: 720
    permissions:
      contents: write

    steps:
      - name: Checkout state repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run scraper action
        id: scrape
        uses: chihacknight/govbot/actions/scrape@✏️{ locale.toolkit_branch }✏️
        with:
          state: ${{ env.STATE_CODE }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-and-push: true
          force-update: ${{ inputs.force-update }}
          branch: main
          api-keys: |
            {
              "DC_API_KEY": "${{ secrets.DC_API_KEY }}",
              "NEW_YORK_API_KEY": "${{ secrets.NEW_YORK_API_KEY }}",
              "INDIANA_API_KEY": "${{ secrets.INDIANA_API_KEY }}",
              "USER_AGENT": "${{ secrets.USER_AGENT }}",
              "HTTPS_PROXY": "${{ env.USE_PROXY == 'true' && secrets.PROXY_URL || '' }}",
              "HTTP_PROXY": "${{ env.USE_PROXY == 'true' && secrets.PROXY_URL || '' }}"
            }

      # See the active (non-paused) template for the full explanation of why
      # this needs repository_dispatch + a GitHub App token rather than
      # workflow_run or a plain PAT.
      - name: Generate GitHub App token for cross-org dispatch
        id: app-token
        if: always()
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: govbot-data
          repositories: ${{ env.STATE_CODE }}-legislation

      - name: Trigger format workflow in govbot-data
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "🚀 Triggering format workflow for ${{ env.STATE_CODE }} in govbot-data..."
          gh api "repos/govbot-data/${{ env.STATE_CODE }}-legislation/dispatches" \
            -f event_type='scrape-complete' \
            -F "client_payload[state]=${{ env.STATE_CODE }}"
