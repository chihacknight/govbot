name: "Govbot"
description: "Pull datasets, classify bills with fastclass, and publish feeds from a govbot.yml manifest"
branding:
  icon: 'rss'
  color: 'orange'

inputs:
  limit:
    description: 'Limit number of entries per published artifact (use "none" for all)'
    required: false
  output-dir:
    description: 'Output directory override for publishers'
    required: false
  output-file:
    description: 'Output filename override for publishers'
    required: false
  govbot-dir:
    description: 'Govbot directory (default: $CWD/.govbot, or GOVBOT_DIR env var)'
    required: false

outputs:
  feed-path:
    description: 'Path to the generated RSS feed file'
    value: ${{ steps.publish.outputs.feed-path }}
  feed-dir:
    description: 'Directory containing the generated RSS feed'
    value: ${{ steps.publish.outputs.feed-dir }}

runs:
  using: "composite"
  steps:
    - name: Download govbot binary
      shell: bash
      run: |
        mkdir -p "${{ github.action_path }}/bin"
        curl -fsSL "https://github.com/chihacknight/govbot/releases/download/nightly/govbot-linux-x86_64" \
          -o "${{ github.action_path }}/bin/govbot"
        chmod +x "${{ github.action_path }}/bin/govbot"

    - name: Set GOVBOT_DIR
      id: set-govbot-dir
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        if [ -n "${{ inputs.govbot-dir }}" ]; then
          export GOVBOT_DIR="${{ inputs.govbot-dir }}"
        else
          export GOVBOT_DIR="${{ github.workspace }}/.govbot"
        fi
        echo "GOVBOT_DIR=$GOVBOT_DIR" >> $GITHUB_ENV
        echo "repos-dir=$GOVBOT_DIR/repos" >> $GITHUB_OUTPUT

    - name: Restore datasets cache
      id: cache-repos
      uses: actions/cache@v4
      with:
        path: ${{ steps.set-govbot-dir.outputs.repos-dir }}
        key: govbot-repos-${{ runner.os }}-${{ hashFiles('govbot.yml') }}
        restore-keys: |
          govbot-repos-${{ runner.os }}-

    - name: Debug cache status
      shell: bash
      run: |
        echo "Cache hit: ${{ steps.cache-repos.outputs.cache-hit }}"
        if [ "${{ steps.cache-repos.outputs.cache-hit }}" == "true" ]; then
          echo "Using cached datasets - will only update existing datasets"
        else
          echo "Cache miss - will pull all datasets"
        fi

    - name: Pull legislation datasets
      id: pull
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        # govbot.yml must exist at the repository root.
        if [ ! -f "${{ github.workspace }}/govbot.yml" ]; then
          echo "::error::govbot.yml not found in repository root"
          exit 1
        fi

        # Cache hit: `govbot pull` (no args) updates existing datasets only.
        # Cache miss: `govbot pull all` does fresh clones.
        if [ "${{ steps.cache-repos.outputs.cache-hit }}" == "true" ]; then
          echo "Cache hit - updating existing datasets..."
          ${{ github.action_path }}/bin/govbot pull \
            --govbot-dir "$GOVBOT_DIR" || true
        else
          echo "Cache miss - pulling all datasets..."
          ${{ github.action_path }}/bin/govbot pull all \
            --govbot-dir "$GOVBOT_DIR" || true
        fi

    - name: Save datasets cache
      if: steps.cache-repos.outputs.cache-hit != 'true'
      uses: actions/cache@v4
      with:
        path: ${{ steps.set-govbot-dir.outputs.repos-dir }}
        key: govbot-repos-${{ runner.os }}-${{ hashFiles('govbot.yml') }}

    - name: Classify and apply
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        # Classification is delegated to fastclass, an external transform that
        # must be resolvable on PATH / ~/.cargo/bin / ~/.govbot/bin. The
        # classifier bundle path is declared in govbot.yml under
        # transforms.<name>.classifier.
        echo "Classifying bills (source | fastclass classify | apply)..."
        ${{ github.action_path }}/bin/govbot source --select docs \
          | fastclass classify - \
          | ${{ github.action_path }}/bin/govbot apply || true

    - name: Publish feeds
      id: publish
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        ARGS=""
        if [ -n "${{ inputs.limit }}" ]; then
          ARGS="$ARGS --limit ${{ inputs.limit }}"
        fi
        if [ -n "${{ inputs.output-dir }}" ]; then
          ARGS="$ARGS --output-dir ${{ inputs.output-dir }}"
        fi
        if [ -n "${{ inputs.output-file }}" ]; then
          ARGS="$ARGS --output-file ${{ inputs.output-file }}"
        fi
        if [ -n "${{ inputs.govbot-dir }}" ]; then
          ARGS="$ARGS --govbot-dir ${{ inputs.govbot-dir }}"
        fi

        # Run the manifest's publishers. govbot.yml is found in the workspace root.
        ${{ github.action_path }}/bin/govbot publish $ARGS

        # Determine the primary output path from the override inputs, defaulting
        # to docs/feed.xml (the wizard's default RSS publisher).
        OUTPUT_DIR="${{ inputs.output-dir }}"
        [ -z "$OUTPUT_DIR" ] && OUTPUT_DIR="docs"
        OUTPUT_FILE="${{ inputs.output-file }}"
        [ -z "$OUTPUT_FILE" ] && OUTPUT_FILE="feed.xml"

        echo "feed-path=${{ github.workspace }}/$OUTPUT_DIR/$OUTPUT_FILE" >> $GITHUB_OUTPUT
        echo "feed-dir=${{ github.workspace }}/$OUTPUT_DIR" >> $GITHUB_OUTPUT
